query RegionDetail($id: String!) {
  regions(id: $id) {
    id
    versionId
    createdAt
    publishedAt
    data {
      climate
      cover_image {
        fileId
        fileName
        hash
        height
        mimeType
        url
        width
      }
      name {
        en
        ru
        zh
      }
      description {
        en
        ru
        zh
      }
    }
  }
}
